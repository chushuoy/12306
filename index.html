<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>团队1225 - 成员介绍</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, sans-serif;}
  body{background:#fff5f8;color:#4a4a4a;line-height:1.6}

  .nav{background:#f8c8dc;color:#5a4a66;padding:1rem;text-align:center;}
  .logo{font-size:1.4rem;font-weight:bold;margin-bottom:0.5rem;}

  .container{max-width:1000px;margin:3rem auto;padding:0 1rem;}
  .title{text-align:center;font-size:2rem;color:#b86b8f;margin-bottom:2.5rem;}

  .team{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:2rem;
  }
  .member{
    background:white;
    border-radius:16px;
    padding:2rem 1rem;
    text-align:center;
    box-shadow:0 2px 12px rgba(220,180,200,0.1);
    border:1px solid #fce4ec;
  }
  .member img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #f8d3e1;
    margin-bottom:1rem;
  }
  .member a{
    font-size:1.1rem;
    font-weight:bold;
    color:#b86b8f;
    text-decoration:none;
  }

  .footer{
    background:#f8c8dc;
    color:#5a4a66;
    text-align:center;
    padding:2rem;
    margin-top:4rem;
  }
</style>
</head>
<body>

<div class="nav">
  <div class="logo">团队1225</div>
</div>

<div class="container">
